spring.application.name=ms-ticket
server.port=8005

spring.datasource.url=jdbc:mariadb://localhost:3306/ticket_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

logging.level.root=INFO
logging.level.com.ticketuki.ticketservice=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

ms.venta.url=${MS_VENTA_URL:http://localhost:8006}
ms.estado.url=${MS_ESTADO_URL:http://localhost:8004}
ms.evento.url=${MS_EVENTO_URL:http://localhost:8003}
ms.recinto.url=${MS_RECINTO_URL:http://localhost:8008}
