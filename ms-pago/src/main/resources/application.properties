spring.application.name=ms-pago
server.port=8009

spring.datasource.url=jdbc:mariadb://localhost:3306/pago_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

logging.level.root=INFO
logging.level.com.ticketuki=DEBUG

ms.venta.url=${MS_VENTA_URL:http://localhost:8006}
ms.usuario.url=${MS_USUARIO_URL:http://localhost:8001}
ms.ticket.url=${MS_TICKET_URL:http://localhost:8005}

# IDs de estado en ms-estado (ajustar según los registros en BD)
ms.estado.ticket.cancelado.id=${MS_ESTADO_TICKET_CANCELADO_ID:3}
ms.estado.venta.anulada.id=${MS_ESTADO_VENTA_ANULADA_ID:3}
