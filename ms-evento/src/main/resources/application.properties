spring.application.name=ms-evento
server.port=8003

spring.datasource.url=jdbc:mariadb://localhost:3306/evento_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

logging.level.root=INFO
logging.level.com.ticketuki=DEBUG
ms.estado.url=${MS_ESTADO_URL:http://localhost:8004}
ms.recinto.url=${MS_RECINTO_URL:http://localhost:8008}
