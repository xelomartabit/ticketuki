spring.application.name=ms-usuario
server.port=8001

spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/usuario_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

logging.level.root=INFO
logging.level.com.ticketuki.usuarioservice=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Actuator: health checks (/actuator/health, /actuator/info)
management.endpoints.web.exposure.include=health,info
